<@cTpl>
<@cContainer>
    <@cRow>
        <@cCol>
            <@cTitle level=2>#i18n{contact.lists.messageSelectList}</@cTitle>
            <@cList>
                <#list list_of_lists as list >
                    <@cListItem url='jsp/site/Portal.jsp?page=contact&amp;view=viewContactPage&amp;id_contact_list=${list.id}' label='${list.label}- ${list.description}' />
                </#list>
            </@cList>
        </@cCol>
    </@cRow>
</@cContainer>
<script>
<@cSetPageTitle title='#i18n{contact.page_contact.pageTitle}' />
</script>
</@cTpl>
